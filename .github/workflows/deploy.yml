name: Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run critical tests
        run: |
          pytest -q tests/integration/test_fastapi_v2.py tests/integration/test_api_contracts.py
          python scripts/smoke_checks.py

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Execute deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          chmod +x scripts/deploy_release.sh
          if [ -n "${DEPLOY_HOST}" ] && [ -n "${DEPLOY_SSH_KEY}" ]; then
            ./scripts/deploy_release.sh --target "${{ inputs.target }}"
          else
            ./scripts/deploy_release.sh --target "${{ inputs.target }}" --dry-run
          fi
