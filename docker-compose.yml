# PostgreSQL для бота (образ официальный). Переменные подхватываются из .env в корне репозитория.
#
# Запуск с корня проекта:
#   docker compose up -d postgres
#
# Бот на хосте (systemd): в .env должны совпадать POSTGRES_* и POSTGRES_HOST=127.0.0.1
# (порт проброшен наружу). Шаблон URL см. docs/DATABASE_POSTGRES.md § Docker.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nopolicybot}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - nopolicybot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nopolicybot_pgdata:
