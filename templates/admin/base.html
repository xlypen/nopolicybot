<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Nopolicybot Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=7">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}?v=7">
  <script>
    (function(){
      var stored = localStorage.getItem('darkMode');
      var isDark;
      if (stored !== null) {
        isDark = stored === 'true';
      } else {
        isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      if (isDark) document.documentElement.classList.add('dark-mode');
    })();
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body class="admin-shell">
  <a class="admin-skip-link" href="#admin-main">К основному содержимому</a>
  <header class="admin-topbar" role="banner">
    <div class="admin-topbar-inner">
      <a class="admin-brand" href="{{ url_for('admin_modern') }}">Nopolicybot</a>
      <nav class="admin-nav" aria-label="Разделы админки">
        {% set ep = request.endpoint or '' %}
        <a class="admin-nav-link {% if ep in ('admin', 'admin_modern') %}is-active{% endif %}" href="{{ url_for('admin_modern') }}">Панель</a>
        <a class="admin-nav-link {% if ep == 'admin_personality_clusters' %}is-active{% endif %}" href="{{ url_for('admin_personality_clusters') }}">Кластеры</a>
        <a class="admin-nav-link {% if ep == 'admin_personality_compare' %}is-active{% endif %}" href="{{ url_for('admin_personality_compare') }}">Сравнение</a>
        <a class="admin-nav-link {% if ep == 'admin_analytics' %}is-active{% endif %}" href="{{ url_for('admin_analytics') }}">Аналитика</a>
        <a class="admin-nav-link {% if ep == 'admin_sparring' %}is-active{% endif %}" href="{{ url_for('admin_sparring') }}">Спарринг</a>
        <a class="admin-nav-link {% if ep == 'admin_legacy' %}is-active{% endif %}" href="{{ url_for('admin_legacy') }}">Классика</a>
        <a class="admin-nav-link {% if ep == 'settings' %}is-active{% endif %}" href="{{ url_for('settings') }}">Настройки</a>
        <a class="admin-nav-link {% if ep == 'admin_classifications' %}is-active{% endif %}" href="{{ url_for('admin_classifications') }}">Оси</a>
      </nav>
      <div class="admin-topbar-actions">
        <button id="darkModeToggle" type="button" class="admin-theme-btn" title="Сменить тему" aria-label="Сменить тему оформления">☀️</button>
        <a class="admin-nav-link admin-nav-link--logout" href="{{ url_for('logout') }}">Выйти</a>
      </div>
    </div>
  </header>
  <div class="admin-wrap" id="admin-main" tabindex="-1">
    {% block breadcrumbs %}{% endblock %}
    {% block body %}{% endblock %}
  </div>
  <script src="{{ url_for('static', filename='js/admin-common.js') }}"></script>
  <script>
  (function(){
    var btn = document.getElementById('darkModeToggle');
    if (!btn) return;
    function applyTheme() {
      var isDark = document.documentElement.classList.contains('dark-mode');
      btn.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
      btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    }
    applyTheme();
    btn.addEventListener('click', function() {
      document.documentElement.classList.toggle('dark-mode');
      var isDark = document.documentElement.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark ? 'true' : 'false');
      applyTheme();
    });
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
