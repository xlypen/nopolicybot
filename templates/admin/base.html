<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Nopolicybot Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="admin-shell">
  <div class="admin-wrap">
    {% block body %}{% endblock %}
  </div>
  <script src="{{ url_for('static', filename='js/admin-common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
