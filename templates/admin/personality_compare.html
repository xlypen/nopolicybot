{% extends "admin/base.html" %}
{% block title %}Сравнение пользователей{% endblock %}
{% block body %}
<div class="hero">
  <div class="header" style="margin-bottom: 6px;">
    <h1>Сравнение профилей личности</h1>
    <div class="actions">
      <a class="btn btn-secondary" href="{{ url_for('admin_modern') }}">← Dashboard</a>
      {% if user_id_a %}<a class="btn btn-secondary" href="{{ url_for('admin_user_profile', user_id=user_id_a) }}?chat={{ chat_id }}">Профиль A</a>{% endif %}
    </div>
  </div>
</div>

<div class="card">
  <div class="title">Выберите двух пользователей</div>
  <div class="row" style="gap:1rem;flex-wrap:wrap;align-items:flex-end;">
    <div>
      <label for="userA" class="meta-line">User A (ID)</label>
      <input type="number" id="userA" value="{{ user_id_a }}" placeholder="ID пользователя" style="width:120px;padding:6px;">
    </div>
    <div>
      <label for="userB" class="meta-line">User B (ID)</label>
      <input type="number" id="userB" placeholder="ID пользователя" style="width:120px;padding:6px;">
    </div>
    <div>
      <label for="chatId" class="meta-line">Chat ID</label>
      <input type="text" id="chatId" value="{{ chat_id }}" placeholder="all или ID чата" style="width:100px;padding:6px;">
    </div>
    <button class="btn btn-secondary" id="compareBtn">Сравнить</button>
  </div>
</div>

<div id="compareResult" class="card" style="display:none;">
  <div class="title">Результат сравнения</div>
  <div id="compareContent"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  function esc(t) { return String(t || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }
  function apiFetch(url, opts) {
    opts = opts || {};
    opts.headers = opts.headers || {};
    opts.headers["Content-Type"] = opts.headers["Content-Type"] || "application/json";
    return fetch(url, opts).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
  }

  document.getElementById("compareBtn").addEventListener("click", function () {
    const ua = document.getElementById("userA").value.trim();
    const ub = document.getElementById("userB").value.trim();
    const chat = document.getElementById("chatId").value.trim() || "all";
    if (!ua || !ub) {
      alert("Укажите оба user ID");
      return;
    }
    const btn = this;
    btn.disabled = true;
    apiFetch("/api/v2/personality/compare", {
      method: "POST",
      body: JSON.stringify({ user_id_a: parseInt(ua, 10), user_id_b: parseInt(ub, 10), chat_id: chat })
    }).then(function (body) {
      btn.disabled = false;
      if (!body.ok) throw new Error(body.error || "Ошибка");
      const c = body.comparison || {};
      const html = [
        "<p><strong>" + esc(c.username_a || c.user_id_a) + "</strong> vs <strong>" + esc(c.username_b || c.user_id_b) + "</strong></p>",
        "<p>Схожесть: <strong>" + Number(c.similarity_score || 0).toFixed(2) + "</strong> (1 = идентичны)</p>",
        "<p class='meta-line'>Наиболее похожие: " + (c.most_similar_dimensions || []).join(", ") + "</p>",
        "<p class='meta-line'>Наиболее разные: " + (c.most_different_dimensions || []).join(", ") + "</p>",
        "<table style='margin-top:8px;'><tr><th>Измерение</th><th>Δ (B − A)</th></tr>",
        Object.entries(c.ocean_deltas || {}).map(function (kv) {
          const label = { openness: "Открытость", conscientiousness: "Добросовестность", extraversion: "Экстраверсия", agreeableness: "Доброжелательность", neuroticism: "Нейротизм" }[kv[0]] || kv[0];
          return "<tr><td>" + esc(label) + "</td><td>" + Number(kv[1]).toFixed(3) + "</td></tr>";
        }).join(""),
        "</table>"
      ].join("");
      document.getElementById("compareContent").innerHTML = html;
      document.getElementById("compareResult").style.display = "block";
    }).catch(function (e) {
      btn.disabled = false;
      document.getElementById("compareContent").innerHTML = "<span style='color:#ef4444;'>" + esc(e.message || e) + "</span>";
      document.getElementById("compareResult").style.display = "block";
    });
  });
})();
</script>
{% endblock %}
